<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mobile phone</title>

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      margin:20px;
    }

    .products{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
    }

    .card{
      width:200px;
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 2px 5px gray;
      text-align:center;
    }

    .card img{
      width:150px;
      height:150px;
      object-fit:cover;
    }

    .card button{
      padding:8px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  
 

.rating{
color:orange;
font-size:18px;
margin:8px 0;
}
    .wish{
background:#E91E63;
color:white;
}

.cart{
background:#1565C0;
color:white;
}
  </style>

</head>

<body>
  <div class="products">

        <div class="card">
            <span class="discount">8% OFF</span>
            <img src="Images/macbookairm4.jpg" alt="MacBook Air M4">
            <h3>Apple MacBook Air M4</h3>
            <div class="rating">★★★★★</div>
            <p class="old">₹1,19,900</p>
            <p class="price">₹1,09,900</p>
            <button class="wish" onclick="addWishlist('Apple MacBook Air M4',109900)">❤️ Wishlist</button>
            <button class="cart" onclick="addToCart('Apple MacBook Air M4',109900)">🛒 Add Cart</button>
            <button onclick="window.location.href='Macbook air M4.html'">View Details</button>

        </div>

        <div class="card">
            <span class="discount">12% OFF</span>
            <img src="Images/dellinspiron.jpg" alt="Dell Inspiron 15">
            <h3>Dell Inspiron 15</h3>
            <div class="rating">★★★★★</div>
            <p class="old">₹74,999</p>
            <p class="price">₹65,999</p>
            <button class="wish" onclick="addWishlist('Dell Inspiron 15',65999)">❤️ Wishlist</button>
            <button class="cart" onclick="addToCart('Dell Inspiron 15',65999)">🛒 Add Cart</button>
            <button onclick="window.location.href='dellinspiron 15.html'">View Details</button>
        </div>

        <div class="card">
            <span class="discount">15% OFF</span>
            <img src="Images/hp pavilion.jpg" alt="HP Pavilion">
            <h3>HP Pavilion 15</h3>
            <div class="rating">★★★★☆</div>
            <p class="old">₹79,999</p>
            <p class="price">₹67,999</p>
            <button class="wish" onclick="addWishlist('HP Pavilion 15',67999)">❤️ Wishlist</button>
            <button class="cart" onclick="addToCart('HP Pavilion 15',67999)">🛒 Add Cart</button>
         <button onclick="window.location.href='hp pavilion.html'">View Details</button>
        </div>

        <div class="card">
            <span class="discount">10% OFF</span>
            <img src="Images/lenovothink.jpg" alt="Lenovo ThinkPad">
            <h3>Lenovo ThinkPad E14</h3>
            <div class="rating">★★★★★</div>
            <p class="old">₹84,999</p>
            <p class="price">₹76,499</p>
            <button class="wish" onclick="addWishlist('Lenovo ThinkPad E14',76499)">❤️ Wishlist</button>
            <button class="cart" onclick="addToCart('Lenovo ThinkPad E14',76499)">🛒 Add Cart</button>
            <button onclick="window.location.href='lenovothinkpad.html'">View Details</button>
        </div>

        <div class="card">
            <span class="discount">18% OFF</span>
            <img src="Images/asusvivobook15.jpg" alt="ASUS Vivobook">
            <h3>ASUS Vivobook 15</h3>
            <div class="rating">★★★★☆</div>
            <p class="old">₹69,999</p>
            <p class="price">₹57,499</p>
            <button class="wish" onclick="addWishlist('ASUS Vivobook 15',57499)">❤️ Wishlist</button>
            <button class="cart" onclick="addToCart('ASUS Vivobook 15',57499)">🛒 Add Cart</button>
            <button onclick="window.location.href='ASUS vivobook 15.html'">View Details</button>
        </div>

    </div>

</div>
<script>

  function addToCart(name,price){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
      name:name,
      price:price
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to Cart");
  }

  function addWishlist(name,price){

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    wishlist.push({
      name:name,
      price:price
    });

    localStorage.setItem("wishlist", JSON.stringify(wishlist));

    alert(name + " added to Wishlist");
  }

</script>

</body>
</html>
