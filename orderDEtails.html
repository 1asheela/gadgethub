<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <title>Order Details</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#2e7d32;
            color:white;
            padding:18px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{

            width:900px;

            margin:30px auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 3px 10px gray;

        }

        .success{

            text-align:center;

            color:green;

            font-size:28px;

            margin-bottom:20px;

        }

        .section{

            margin-top:25px;

        }

        .section h2{

            background:#4CAF50;

            color:white;

            padding:10px;

            border-radius:5px;

            margin-bottom:15px;

        }

        .info{

            line-height:2;

            font-size:18px;

        }

        table{

            width:100%;

            border-collapse:collapse;

            margin-top:15px;

        }

        table th{

            background:#2e7d32;

            color:white;

            padding:12px;

        }

        table td{

            padding:12px;

            border:1px solid #ddd;

            text-align:center;

        }

        .total-box{

            margin-top:25px;

            text-align:right;

            font-size:20px;

            line-height:2;

        }

        .buttons{

            margin-top:30px;

            text-align:center;

        }

        button{

            padding:12px 25px;

            margin:10px;

            border:none;

            border-radius:5px;

            cursor:pointer;

            font-size:16px;

            color:white;

        }

        .home{

            background:#2196F3;

        }

        .download{

            background:#4CAF50;

        }

        .print{

            background:#ff9800;

        }

        button:hover{

            opacity:0.9;

        }

    </style>

</head>

<body>

<header>

    FreshKart Order Details

</header>

<div class="container">

    <div class="success">

        🎉 Order Placed Successfully

    </div>

    <div class="section">

        <h2>Customer Details</h2>

        <div class="info" id="customerDetails">

        </div>

    </div>

    <div class="section">

        <h2>Ordered Products</h2>

        <table>

            <thead>

            <tr>

                <th>Product</th>

                <th>Price</th>

                <th>Quantity</th>

                <th>Total</th>

            </tr>

            </thead>

            <tbody id="orderItems">

            </tbody>

        </table>

    </div>

    <div class="total-box" id="billDetails">

    </div>

    <div class="buttons">

        <button class="print" onclick="window.print()">

            🖨 Print

        </button>

        <button class="download" onclick="downloadOrder()">

            ⬇ Download Invoice

        </button>

        <button class="home"

                onclick="window.location.href='Home.html'">

            🏠 Home

        </button>

    </div>

</div>
<script>

    let cart = JSON.parse(localStorage.getItem("lastOrderCart")) || [];

    let customerName = localStorage.getItem("customerName") || "";
    let email = localStorage.getItem("email") || "";
    let mobile = localStorage.getItem("mobile") || "";
    let address = localStorage.getItem("address") || "";
    let city = localStorage.getItem("city") || "";
    let pincode = localStorage.getItem("pincode") || "";

    let payment = localStorage.getItem("paymentMethod") || "";

    let subtotal = Number(localStorage.getItem("lastSubtotal")) || 0;
    let gst = Number(localStorage.getItem("lastGST")) || 0;
    let shipping = Number(localStorage.getItem("lastShipping")) || 0;
    let total = Number(localStorage.getItem("lastGrandTotal")) || 0;

    window.onload=function(){

        loadCustomer();

        loadProducts();

    };

    function loadCustomer(){

        document.getElementById("customerDetails").innerHTML=`

<b>Name :</b> ${customerName}<br><br>

<b>Email :</b> ${email}<br><br>

<b>Mobile :</b> ${mobile}<br><br>

<b>Address :</b> ${address}, ${city} - ${pincode}<br><br>

<b>Payment :</b> ${payment}<br><br>

<b>Status :</b>

<span style="color:green;font-weight:bold">

Pending

</span>

`;

    }

    function loadProducts(){

        let rows="";

        if(cart.length==0){

            rows=`

<tr>

<td colspan="4">

No Order Found

</td>

</tr>

`;

        }

        else{

            cart.forEach(item=>{

                let name=item.productName || item.name;

                let qty=item.quantity || 1;

                let price=item.price || 0;

                rows+=`

<tr>

<td>${name}</td>

<td>₹${price}</td>

<td>${qty}</td>

<td>₹${(price*qty).toFixed(2)}</td>

</tr>

`;

            });

        }

        document.getElementById("orderItems").innerHTML=rows;

        document.getElementById("billDetails").innerHTML=`

<p>Subtotal : ₹${subtotal.toFixed(2)}</p>

<p>GST : ₹${gst.toFixed(2)}</p>

<p>Shipping : ₹${shipping.toFixed(2)}</p>

<hr>

<h2>Grand Total : ₹${total.toFixed(2)}</h2>

`;

    }

    function downloadOrder(){

        let text="========== ELECTROMART INVOICE ==========\n\n";

        text+="Customer : "+customerName+"\n";

        text+="Email : "+email+"\n";

        text+="Mobile : "+mobile+"\n";

        text+="Address : "+address+", "+city+" - "+pincode+"\n";

        text+="Payment : "+payment+"\n\n";

        text+="---------------------------------\n";

        cart.forEach(item=>{

            let name=item.productName || item.name;

            let qty=item.quantity || 1;

            let price=item.price || 0;

            text+=name+" x "+qty+" = ₹"+(price*qty).toFixed(2)+"\n";

        });

        text+="---------------------------------\n";

        text+="Subtotal : ₹"+subtotal.toFixed(2)+"\n";

        text+="GST : ₹"+gst.toFixed(2)+"\n";

        text+="Shipping : ₹"+shipping.toFixed(2)+"\n";

        text+="Grand Total : ₹"+total.toFixed(2)+"\n";

        text+="\nThank You For Shopping With FreshKart";

        let blob=new Blob([text],{type:"text/plain"});

        let a=document.createElement("a");

        a.href=URL.createObjectURL(blob);

        a.download="ElectroMart_Order.txt";

        a.click();

    }

</script>

</body>
</html>
