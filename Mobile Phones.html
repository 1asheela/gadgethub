<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mobile phone</title>

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      margin:20px;
    }

    .products{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
    }

    .card{
      width:200px;
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 2px 5px gray;
      text-align:center;
    }

    .card img{
      width:150px;
      height:150px;
      object-fit:cover;
    }

    .card button{
      padding:8px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  
 

.rating{
color:orange;
font-size:18px;
margin:8px 0;
}
    .wish{
background:#E91E63;
color:white;
}

.cart{
background:#1565C0;
color:white;
}
  </style>

</head>

<body>
    <div class="category">

<h2>📱 Mobile Phones</h2>

<div class="products">

<div class="card">
<span class="discount">10% OFF</span>
<img src="Images/iphone15.jpg" alt="iPhone 15">
<h3>Apple iPhone 15</h3>
<div class="rating">★★★★★</div>
<p class="old">₹89,999</p>
<p class="price">₹79,999</p>
<button class="wish" onclick="addWishlist('Apple iPhone 15',79999)">❤️ Wishlist</button>
<button class="cart" onclick="addToCart('Apple iPhone 15',79999)">🛒 Add Cart</button>
<button onclick="window.location.href='iphone15.html'">View Details</button>
</div>


<div class="card">
<span class="discount">12% OFF</span>
<img src="Images/galaxys24.jpg" alt="Samsung Galaxy S24">
<h3>Samsung Galaxy S24</h3>
<div class="rating">★★★★★</div>
<p class="old">₹84,999</p>
<p class="price">₹74,999</p>
<button class="wish" onclick="addWishlist('Samsung Galaxy S24',74999)">❤️ Wishlist</button>
<button class="cart" onclick="addToCart('Samsung Galaxy S24',74999)">🛒 Add Cart</button>

<button onclick="window.location.href='galaxys24.html'">View Details</button>
</div>
  



<div class="card">
<span class="discount">8% OFF</span>
<img src="Images/oneplus13.jpg" alt="OnePlus 13">
<h3>OnePlus 13</h3>
<div class="rating">★★★★☆</div>
<p class="old">₹75,999</p>
<p class="price">₹69,999</p>
<button class="wish" onclick="addWishlist('OnePlus 13',69999)">❤️ Wishlist</button>
<button class="cart" onclick="addToCart('OnePlus 13',69999)">🛒 Add Cart</button>
<button onclick="window.location.href='oneplus13.html'">View Details</button>
</div>

<div class="card">
<span class="discount">15% OFF</span>
<img src="Images/vivox200.jpg" alt="Vivo X200">
<h3>Vivo X200</h3>
<div class="rating">★★★★☆</div>
<p class="old">₹69,999</p>
<p class="price">₹59,999</p>
<button class="wish" onclick="addWishlist('Vivo X200',59999)">❤️ Wishlist</button>
<button class="cart" onclick="addToCart('Vivo X200',59999)">🛒 Add Cart</button>
<button onclick="window.location.href='vivox200.html'">View Details</button>
</div>

<div class="card">
<span class="discount">18% OFF</span>
<img src="Images/realmegt7.jpg" alt="Realme GT 7">
<h3>Realme GT 7</h3>
<div class="rating">★★★★☆</div>
<p class="old">₹54,999</p>
<p class="price">₹44,999</p>
<button class="wish" onclick="addWishlist('Realme GT 7',44999)">❤️ Wishlist</button>
<button class="cart" onclick="addToCart('Realme GT 7',44999)">🛒 Add Cart</button>
<button onclick="window.location.href='realmegt7.html'">View Details</button>
</div>

</div>

</div>
<script>

  function addToCart(name,price){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
      name:name,
      price:price
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to Cart");
  }

  function addWishlist(name,price){

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    wishlist.push({
      name:name,
      price:price
    });

    localStorage.setItem("wishlist", JSON.stringify(wishlist));

    alert(name + " added to Wishlist");
  }

</script>

</body>
</html>
