<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>OnePlus 13</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6fb;
      margin: 0
    }

    header {
      background: #0b3d91;
      color: #fff;
      text-align: center;
      padding: 15px
    }

    .wrap {
      display: flex;
      gap: 30px;
      padding: 30px
    }

    .left {
      width: 45%
    }

    .left img {
      width: 100%;
      border: 1px solid #ccc
    }

    .thumbs img {
      width: 70px;
      height: 70px;
      margin: 5px;
      cursor: pointer
    }

    .right {
      flex: 1;
      background: #fff;
      padding: 20px
    }

    .price {
      color: #d32f2f;
      font-size: 28px
    }

    .old {
      text-decoration: line-through
    }

    button {
      padding: 10px;
      margin: 5px
    }

    .cart {
      background: #ff9800
    }

    .wish {
      background: #e91e63;
      color: #fff
    }

    .buy {
      background: #0b3d91;
      color: #fff
    }

    table {
      border-collapse: collapse;
      width: 100%
    }

    td {
      border: 1px solid #ddd;
      padding: 8px
    }

    .sec {
      background: #fff;
      margin: 20px;
      padding: 20px
    }
  </style>
</head>

<body>
  <header>
    <h1>OnePlus 13</h1>
  </header>
  <div class="wrap">
    <div class="left">
      <img id="main" src="Images/oneplus13.jpg">

      <div class="thumbs">
        <img src="Images/oneplus13.jpg" onclick="main.src=this.src">
        <img src="Images/oneplus13 2.jpg" onclick="main.src=this.src">
        <img src="Images/oneplus13 3.jpg" onclick="main.src=this.src">
      </div>
    </div>
    <div class="right">
      <h2>OnePlus 13 (256GB)</h2>
      <p>⭐⭐⭐⭐⭐ 4.8/5</p>
      <p class="price">₹69,999 <span class="old">₹76,999</span></p>
      <p>Qty <button onclick="f(-1)">-</button>
        <span id="q">1</span>
        <button onclick="f(1)">+</button>
      </p>
      <button class="cart" onclick="alert('Added to Cart')">🛒 Add to Cart</button>
      <button class="wish" onclick="alert('Added to Wishlist')">❤️ Wishlist</button>
      <button class="buy" onclick="alert('Proceed to Checkout')">⚡ Buy Now</button>
      <h3>Description</h3>
      <p>Snapdragon flagship, AMOLED display, Hasselblad cameras and fast charging.</p>
      <table>
        <tr>
          <td>RAM</td>
          <td>12GB</td>
        </tr>
        <tr>
          <td>Storage</td>
          <td>256GB</td>
        </tr>
        <tr>
          <td>Battery</td>
          <td>6000mAh</td>
        </tr>
      </table>
    </div>
  </div>
  <div class="sec">
    <h2>Reviews</h2>
    <p>⭐⭐⭐⭐⭐ Excellent performance.</p>
  </div>
  <script>
    let n = 1;
    function f(x) {
      n = Math.max(1, n + x);
      q.innerText = n;
    }
  </script>
</body>

</html>
