<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Wishlist</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#e91e63;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:80%;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px gray;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    border-bottom:1px solid #ddd;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.cart{
    background:#ff9800;
}

.remove{
    background:red;
}

.home{
    background:#2196F3;
}

.empty{
    text-align:center;
    font-size:22px;
    color:gray;
    padding:30px;
}

</style>

</head>

<body>

<header>

<h1>❤️ My Wishlist</h1>

</header>

<div style="padding:20px;">

<button class="home"
onclick="window.location='Home.html'">

🏠 Home

</button>

</div>

<div class="container" id="wishlistContainer"></div>

<script>

function loadWishlist(){

let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

let container=document.getElementById("wishlistContainer");

container.innerHTML="";

if(wishlist.length==0){

container.innerHTML="<div class='empty'>Your Wishlist is Empty ❤️</div>";

return;

}

wishlist.forEach((item,index)=>{

container.innerHTML+=`

<div class="item">

<div>

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

<div>

<button class="cart"

onclick="moveCart(${index})">

🛒 Move to Cart

</button>

<button class="remove"

onclick="removeItem(${index})">

Remove

</button>

</div>

</div>

`;

});

}

function moveCart(index){

let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let item=wishlist[index];

item.quantity=1;

cart.push(item);

wishlist.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

localStorage.setItem("wishlist",JSON.stringify(wishlist));

loadWishlist();

alert("Moved to Cart");

}

function removeItem(index){

let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

wishlist.splice(index,1);

localStorage.setItem("wishlist",JSON.stringify(wishlist));

loadWishlist();

}

window.onload=loadWishlist;

</script>

</body>
</html>
