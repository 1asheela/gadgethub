<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Hub | Seller Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f8fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:420px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo img{
            width:90px;
            height:90px;
            background:#0B3C6D;
            padding:15px;
            border-radius:50%;
            margin-bottom:15px;
        }

        .logo h1{
            color:#0B3C6D;
            margin-bottom:5px;
        }

        .logo p{
            color:#000;
        }

        label{
            display:block;
            margin-top:18px;
            margin-bottom:6px;
            font-weight:bold;
            color:#000;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:2px solid #0B3C6D;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:13px;
            background:#0B3C6D;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#082b4d;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#000;
        }

        .footer a{
            color:#0B3C6D;
            font-weight:bold;
            text-decoration:none;
        }

        .footer a:hover{
            text-decoration:underline;
        }

        @media(max-width:480px){

            .container{
                padding:25px;
            }

            .logo img{
                width:75px;
                height:75px;
            }

            .logo h1{
                font-size:24px;
            }

            input{
                font-size:14px;
            }

            button{
                font-size:16px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="logo">

        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Seller Login">

        <h1>Gadget Hub</h1>

        <p>Seller Login</p>

    </div>

    <form id="loginForm">

        <label>Username or Email</label>

        <input
            type="text"
            id="username"
            placeholder="Enter Username or Email"
            required>

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">

        Don't have an account?

        <a href="register.html">
            Register
        </a>

    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

    e.preventDefault();

    let username=document.getElementById("username").value.trim();

    let password=document.getElementById("password").value.trim();

    if(username==="" || password===""){

        alert("Please fill all fields.");

        return;

    }

    alert("Login Successful!");

   
});

</script>

</body>
</html>
